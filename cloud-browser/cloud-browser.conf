server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.unshortlink.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cloudflare-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Stream host for WebSocket direct bypass (injected into sub_filter)
    set $stream_host "stream.unshortlink.com";

    # API and WebSocket - Backend NestJS
    location /api/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.io WebSocket
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Browser session proxy — HTML page only (with paste fix injection)
    # Matches: /browser/4000/ (trailing slash = HTML page)
    location ~ ^/browser/(\d+)/?$ {
        set $browser_port $1;

        proxy_pass http://127.0.0.1:$browser_port/$is_args$args;
        proxy_http_version 1.1;

        # Hide upstream headers that prevent embedding
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;

        # --- Safari/Firefox paste fix ---
        proxy_set_header Accept-Encoding "";
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 4k;

        sub_filter_once on;
        sub_filter_types text/html;

        sub_filter '</head>' '<style>
        #overlayInput, #keyboard-input-assist, [contenteditable], canvas, video, input {
          -webkit-touch-callout: none !important;
          -webkit-user-select: none !important;
          user-select: none !important;
          -webkit-user-modify: read-only !important;
        }
        .virtual-keyboard-button { display: none !important; }
        </style><script>
        (function(){
          /* Override WebSocket to route stream through direct connection (bypass Cloudflare) */
          var _WS=window.WebSocket;var _SH="$stream_host";window.WebSocket=function(url,protocols){if(typeof url==="string"&&_SH&&url.indexOf(window.location.host)!==-1){url=url.replace(window.location.host,_SH);}return protocols?new _WS(url,protocols):new _WS(url);};window.WebSocket.prototype=_WS.prototype;window.WebSocket.CONNECTING=_WS.CONNECTING;window.WebSocket.OPEN=_WS.OPEN;window.WebSocket.CLOSING=_WS.CLOSING;window.WebSocket.CLOSED=_WS.CLOSED;
          if(navigator.clipboard&&navigator.clipboard.readText){
            navigator.clipboard.readText=function(){return Promise.reject(new DOMException("Not allowed","NotAllowedError"));};
          }
          if(navigator.clipboard&&navigator.clipboard.read){
            navigator.clipboard.read=function(){return Promise.reject(new DOMException("Not allowed","NotAllowedError"));};
          }
          /* Clipboard bridge: forward remote clipboard updates to parent page */
          window.addEventListener("message",function(e){
            if(e.data&&e.data.type==="clipboardContentUpdate"&&e.source===window){
              window.parent.postMessage({type:"clipboardContentUpdate",text:e.data.text},"*");
            }
          });
          /* Scroll sensitivity: smoother and more natural */
          (function tuneScroll(){
            var i=setInterval(function(){
              if(window.webrtcInput){
                var wi=window.webrtcInput;
                /* Desktop/trackpad scroll tuning */
                wi._scrollMagnitude=5;
                wi._wheelThreshold=0;
                wi._SCROLL_PIXELS_PER_TICK=35;
                wi._MAX_SCROLL_MAGNITUDE=6;
                clearInterval(i);
              }
            },500);
          })();
        })();
        </script></head>';

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache off;
    }

    # Browser session proxy — assets, WebSocket, streaming (no sub_filter)
    # Matches: /browser/4000/assets/..., /browser/4000/ws, etc.
    location ~ ^/browser/(\d+)/(.+)$ {
        set $browser_port $1;
        set $browser_path $2;

        proxy_pass http://127.0.0.1:$browser_port/$browser_path$is_args$args;
        proxy_http_version 1.1;

        # Hide upstream headers that prevent embedding
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;

        # WebSocket support for streaming
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for browser sessions
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Streaming-optimized: no buffering, no cache
        proxy_buffering off;
        proxy_cache off;
    }

    # Frontend - Next.js
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name test.unshortlink.com;
    return 301 https://$host$request_uri;
}
