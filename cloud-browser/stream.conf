# HTTP → HTTPS redirect
server {
    listen 80;
    server_name stream.unshortlink.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Stream server — direct WebSocket proxy (bypasses Cloudflare)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stream.unshortlink.com;

    ssl_certificate /etc/letsencrypt/live/stream.unshortlink.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.unshortlink.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Allow cross-origin WebSocket from unshortlink.com subdomains
    set $cors_origin "";
    if ($http_origin ~* "^https://([a-z]+\.)?unshortlink\.com$") {
        set $cors_origin $http_origin;
    }
    add_header Access-Control-Allow-Origin $cors_origin always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Proxy browser session WebSocket and assets
    # Matches: /browser/PORT/websocket, /browser/PORT/assets/..., etc.
    location ~ ^/browser/(\d+)/(.+)$ {
        set $browser_port $1;
        set $browser_path $2;

        proxy_pass http://127.0.0.1:$browser_port/$browser_path$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long timeout for streaming
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Disable buffering for real-time streaming
        proxy_buffering off;
        proxy_cache off;
        tcp_nodelay on;
        tcp_nopush off;
    }

    # Root catch-all
    location / {
        return 404;
    }
}
