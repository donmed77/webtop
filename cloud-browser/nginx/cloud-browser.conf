server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.unshortlink.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/cloudflare-origin.crt;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Stream host for WebSocket direct bypass (injected into sub_filter)
    set $stream_host "stream.unshortlink.com";

    # Resolve real client IP: Cloudflare sets CF-Connecting-IP to the true user IP
    set $real_client_ip $remote_addr;
    if ($http_cf_connecting_ip) {
        set $real_client_ip $http_cf_connecting_ip;
    }

    # Fix #9: Session creation rate limit (strict: 1r/s, burst 3)
    location = /api/session {
        limit_req zone=session_create burst=3 nodelay;

        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API and WebSocket - Backend NestJS
    location /api/ {
        # Fix #9: General API rate limit (10r/s, burst 20)
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.io WebSocket
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $real_client_ip;
        proxy_set_header X-Forwarded-For $real_client_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Fix #6: Internal auth endpoint for browser port validation
    location = /internal/auth/browser {
        internal;
        proxy_pass http://127.0.0.1:3005/api/session/auth/browser;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Browser-Port $browser_port;
        proxy_set_header X-Session-Token $session_token;
    }

    # Browser session proxy — HTML page only (with paste fix injection)
    # Matches: /browser/4000/ (trailing slash = HTML page)
    location ~ ^/browser/(\d+)/?$ {
        set $browser_port $1;
        set $session_token $arg_token;

        auth_request /internal/auth/browser;

        # Fix #9: Browser page rate limit
        limit_req zone=browser_limit burst=50 nodelay;

        proxy_pass http://127.0.0.1:$browser_port/$is_args$args;
        proxy_http_version 1.1;

        # Hide upstream headers that prevent embedding
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;

        # --- Safari/Firefox paste fix ---
        proxy_set_header Accept-Encoding "";
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 4 4k;

        sub_filter_once on;
        sub_filter_types text/html;

        sub_filter '</head>' '<style>
        #overlayInput, #keyboard-input-assist, [contenteditable], canvas, video, input {
          -webkit-touch-callout: none !important;
          -webkit-user-select: none !important;
          user-select: none !important;
          -webkit-user-modify: read-only !important;
        }
        .virtual-keyboard-button { display: none !important; }
        .status-bar, #playButton { display: none !important; }
        .sidebar, .toggle-button-sidebar, .dashboard-overlay-container { display: none !important; }
        </style><script>
        (function(){
          var _m=(window.matchMedia&&window.matchMedia("(pointer: coarse)").matches)||(navigator.maxTouchPoints>0&&window.innerWidth<1400)||("ontouchstart" in window&&window.innerWidth<1400);if(_m){Object.defineProperty(window,"devicePixelRatio",{get:function(){return 1.5}})}
          var _WS=window.WebSocket;var _SH="$stream_host";window.WebSocket=function(u,p){if(typeof u==="string"&&_SH&&u.indexOf(window.location.host)!==-1){u=u.replace(window.location.host,_SH);}return p?new _WS(u,p):new _WS(u);};window.WebSocket.prototype=_WS.prototype;window.WebSocket.CONNECTING=_WS.CONNECTING;window.WebSocket.OPEN=_WS.OPEN;window.WebSocket.CLOSING=_WS.CLOSING;window.WebSocket.CLOSED=_WS.CLOSED;
          if(navigator.clipboard&&navigator.clipboard.readText){navigator.clipboard.readText=function(){return Promise.reject(new DOMException("Not allowed","NotAllowedError"));};}
          if(navigator.clipboard&&navigator.clipboard.read){navigator.clipboard.read=function(){return Promise.reject(new DOMException("Not allowed","NotAllowedError"));};}
          window.addEventListener("message",function(e){if(e.data&&e.data.type==="clipboardContentUpdate"&&e.source===window){window.parent.postMessage({type:"clipboardContentUpdate",text:e.data.text},"*");}});
          (function(){var i=setInterval(function(){if(window.webrtcInput){var w=window.webrtcInput;w._scrollMagnitude=5;w._wheelThreshold=0;w._SCROLL_PIXELS_PER_TICK=35;w._MAX_SCROLL_MAGNITUDE=6;clearInterval(i);}},500);})();
          var _A=window.AudioContext||window.webkitAudioContext;if(_A){window._ax=[];var _R=_A.prototype.resume;var _b=true;_A.prototype.resume=function(){return _b?Promise.resolve():_R.call(this);};var _O=_A;window.AudioContext=function(o){var c=new _O(o);window._ax.push(c);return c;};window.AudioContext.prototype=_O.prototype;if(window.webkitAudioContext)window.webkitAudioContext=window.AudioContext;}
          var _on=false,_k=false;window.addEventListener("message",function(e){if(!e.data)return;if(e.data.type==="pipelineStatusUpdate"&&e.data.audio===true&&!_on&&!_k){_k=true;setTimeout(function(){window.postMessage({type:"pipelineControl",pipeline:"audio",enabled:false},window.location.origin);},100);}if(e.data.type==="toggleAudio"){_on=!_on;if(!_on)_k=false;if(_on){_b=false;var a=window._ax||[];for(var i=0;i<a.length;i++){_R.call(a[i]);}}else{_b=true;}window.postMessage({type:"pipelineControl",pipeline:"audio",enabled:_on},window.location.origin);window.parent.postMessage({type:"audioState",muted:!_on},"*");}if(e.data.type==="getAudioState"){window.parent.postMessage({type:"audioState",muted:!_on},"*");}});
        })();
        </script></head>';

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache off;
    }

    # Browser session proxy — assets, WebSocket, streaming (no sub_filter)
    # Matches: /browser/4000/assets/..., /browser/4000/ws, etc.
    # No auth here — sub-resources loaded from within the authenticated iframe
    location ~ ^/browser/(\d+)/(.+)$ {
        set $browser_port $1;
        set $browser_path $2;

        proxy_pass http://127.0.0.1:$browser_port/$browser_path$is_args$args;
        proxy_http_version 1.1;

        # Hide upstream headers that prevent embedding
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;

        # WebSocket support for streaming
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeout for browser sessions
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;

        # Streaming-optimized: no buffering, no cache
        proxy_buffering off;
        proxy_cache off;
    }

    # Frontend - Next.js
    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name test.unshortlink.com;
    return 301 https://$host$request_uri;
}
